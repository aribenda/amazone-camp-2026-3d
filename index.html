<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmaZONE Camp 2026 Walkthrough</title>
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>
      <section id="entryPanel" aria-labelledby="entryTitle">
        <form id="entryForm">
          <h1 id="entryTitle">Enter camp</h1>
          <label for="passwordInput">Camp word</label>
          <div class="password-row">
            <input
              id="passwordInput"
              name="password"
              type="password"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
            />
            <button type="submit">Enter camp</button>
          </div>
          <p id="passwordError" aria-live="polite"></p>
        </form>
      </section>
      <div id="hud" aria-live="polite">
        <span id="selectedId">-</span>
        <strong id="selectedName">AmaZONE Camp 2026</strong>
      </div>
      <div id="mobileControls" class="is-hidden" aria-hidden="true">
        <div id="joystick">
          <div id="joystickKnob"></div>
        </div>
      </div>
      <div id="crosshair" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
